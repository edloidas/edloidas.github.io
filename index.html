<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#060606" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />

    <title>{{nickname}}</title>

    <!-- Main Meta Tags -->
    <meta name="description" content="{{description}}" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="{{fullName}}" />
    <link rel="canonical" href="{{domainUrl}}/" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Apple Mobile Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="{{nickname}}" />

    <!-- Meta Open Graph -->
    <meta property="og:type" content="profile" />
    <meta property="og:title" content="{{fullName}}" />
    <meta property="og:image" content="{{domainUrl}}/avatar.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="{{nickname}} avatar" />
    <meta property="og:description" content="{{description}}" />
    <meta property="og:url" content="{{domainUrl}}/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="edloidas.io" />
    <meta property="profile:first_name" content="{{name}}" />
    <meta property="profile:last_name" content="{{surname}}" />
    <meta property="profile:username" content="{{nickname}}" />

    <!-- Meta Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="{{twitterHandle}}" />
    <meta name="twitter:creator" content="{{twitterHandle}}" />
    <meta name="twitter:title" content="{{fullName}}" />
    <meta name="twitter:image" content="{{domainUrl}}/avatar.png" />
    <meta name="twitter:image:alt" content="{{nickname}} avatar" />
    <meta name="twitter:description" content="{{description}}" />

    <!-- Prevent Flash of Unstyled Content -->
    <style>
    @layer base {
      body {
        background-color: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #060606;
        }
      }
    }
    </style>

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
{{jsonLd}}
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script type="module" src="/src/main.ts"></script>
  </head>

  <body>
    <canvas id="background" aria-hidden="true"></canvas>

    <button
      type="button"
      class="theme-toggle"
      id="theme-toggle"
      aria-label="Toggle theme"
      title="Toggle theme"
    >
      <svg class="theme-icon theme-icon--auto" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 2v2"/><path d="M14.837 16.385a6 6 0 1 1-7.223-7.222c.624-.147.97.66.715 1.248a4 4 0 0 0 5.26 5.259c.589-.255 1.396.09 1.248.715"/><path d="M16 12a4 4 0 0 0-4-4"/><path d="m19 5-1.256 1.256"/><path d="M20 12h2"/></svg>
      <svg class="theme-icon theme-icon--light" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="4" />
        <path d="M12 2v2" />
        <path d="M12 20v2" />
        <path d="m4.93 4.93 1.41 1.41" />
        <path d="m17.66 17.66 1.41 1.41" />
        <path d="M2 12h2" />
        <path d="M20 12h2" />
        <path d="m6.34 17.66-1.41 1.41" />
        <path d="m19.07 4.93-1.41 1.41" />
      </svg>
      <svg class="theme-icon theme-icon--dark" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
      </svg>
    </button>

    <div class="page">
      <main class="content">
        <header class="header">
          <h1 class="name">
            <span class="name__line">{{name}}</span>
            <span class="name__line">{{surname}}</span>
          </h1>

          <div class="bio">
            <p class="bio__title">
              {{position}} at <a href="{{companyUrl}}" class="bio__accent" target="_blank" rel="noopener noreferrer">{{company}}</a>.
            </p>
            <p class="bio__description">{{hobby}}.</p>
          </div>

          <div class="cta" role="group" aria-label="Contact">
            <a href="mailto:{{email}}" class="cta__button" aria-label="Send email to {{email}}">
              <span>{{email}}</span>
              <svg class="cta__icon" viewBox="0 0 24 24" aria-hidden="true">
                <line x1="5" y1="12" x2="19" y2="12" stroke-linecap="round" stroke-linejoin="round"></line>
                <polyline points="12 5 19 12 12 19" stroke-linecap="round" stroke-linejoin="round"></polyline>
              </svg>
            </a>
          </div>
        </header>

        <footer class="footer">
          <nav class="social" aria-label="Social links">
            <a href="{{githubUrl}}" class="social__link" rel="noopener noreferrer">GitHub</a>
            <a href="{{instagramUrl}}" class="social__link" rel="noopener noreferrer">Instagram</a>
            <a href="{{xUrl}}" class="social__link" rel="noopener noreferrer" aria-label="X (formerly Twitter)">X</a>
          </nav>
        </footer>
      </main>
    </div>
  </body>
</html>
